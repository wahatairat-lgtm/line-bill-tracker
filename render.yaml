databases:
  - name: bill-tracker-db
    plan: free
    databaseName: billtracker
    user: billtracker

services:
  - type: web
    name: bill-tracker-line-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bill-tracker-db
          property: connectionString
